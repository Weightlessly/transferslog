<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>TransferLog</title>
<meta name="theme-color" content="#0e0e10"><meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="TransferLog">
<meta name="apple-mobile-web-app-title" content="TransferLog">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/transferslog/manifest.json">

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=DM+Sans:wght@300;400;500&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0e0e10;--bg2:#1a1a1f;--bg3:#242429;
    --border:rgba(255,255,255,0.08);
    --text:#f0f0f0;--muted:#888;
    --accent:#6c6fff;--green:#3ecf8e;
    --orange:#f5a623;--blue:#4da3ff;
    --red:#ff5f57;--purple:#c084fc;
    --radius:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;max-width:430px;margin:0 auto;overflow-x:hidden;padding-top:env(safe-area-inset-top);padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right);}
  h1,h2,h3{font-family:'Syne',sans-serif;}

  .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom);}
  .nav-btn{flex:1;padding:12px 0 10px;background:none;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:color 0.15s;}
  .nav-btn.active{color:var(--accent);}
  .nav-icon{font-size:20px;line-height:1;}

  .page{display:none;}.page.active{display:block;}

  .header{padding:calc(56px + env(safe-area-inset-top)) 20px 12px;display:flex;justify-content:space-between;align-items:flex-end;position:sticky;top:0;background:var(--bg);z-index:10;border-bottom:1px solid var(--border);}
  .header h1{font-size:26px;font-weight:700;letter-spacing:-0.5px;}
  .header span{font-size:12px;color:var(--muted);}
  .add-btn{width:40px;height:40px;background:var(--accent);border:none;border-radius:12px;color:white;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform 0.15s;flex-shrink:0;}
  .add-btn:active{transform:scale(0.92);}

  /* Search bar */
  .search-wrap{padding:10px 20px;position:sticky;top:82px;background:var(--bg);z-index:9;}
  .search-box{display:flex;align-items:center;gap:10px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:0 14px;}
  .search-icon{font-size:15px;color:var(--muted);flex-shrink:0;}
  .search-input{flex:1;background:transparent;border:none;outline:none;color:var(--text);font-family:'DM Sans',sans-serif;font-size:14px;padding:11px 0;}
  .search-input::placeholder{color:var(--muted);}
  .search-clear{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:0;line-height:1;display:none;}
  .search-clear.visible{display:block;}

  .stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding:10px 20px;border-bottom:1px solid var(--border);}
  .stat{background:var(--bg2);border-radius:12px;padding:10px 12px;}
  .stat .val{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;}
  .stat .lbl{font-size:10px;color:var(--muted);margin-top:2px;}

  .filters{display:flex;gap:8px;padding:10px 20px;overflow-x:auto;scrollbar-width:none;}
  .filters::-webkit-scrollbar{display:none;}
  .filter-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;white-space:nowrap;transition:all 0.15s;}
  .filter-btn.active{background:var(--accent);border-color:var(--accent);color:white;}

  .list{padding:8px 20px 120px;}

  .transfer-card{background:var(--bg2);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;border:1px solid var(--border);cursor:pointer;transition:transform 0.15s,background 0.15s;animation:slideIn 0.25s ease;}
  @keyframes slideIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  .transfer-card:active{transform:scale(0.98);background:var(--bg3);}
  .card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .card-amount{font-family:'Syne',sans-serif;font-size:15px;font-weight:600;}
  .status-badge{font-size:10px;font-weight:500;padding:3px 10px;border-radius:20px;}
  .status-waiting{background:rgba(245,166,35,0.15);color:var(--orange);}
  .status-check{background:rgba(77,163,255,0.15);color:var(--blue);}
  .status-done{background:rgba(62,207,142,0.15);color:var(--green);}
  .card-bot{display:flex;justify-content:space-between;align-items:center;}
  .card-meta{font-size:11px;color:var(--muted);}
  .card-commission{font-size:11px;color:var(--green);font-weight:500;}

  .receipt-card{background:var(--bg2);border-radius:var(--radius);padding:14px 16px;margin-bottom:10px;border:1px solid rgba(192,132,252,0.2);cursor:pointer;animation:slideIn 0.25s ease;transition:transform 0.15s;}
  .receipt-card:active{transform:scale(0.98);}
  .receipt-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
  .receipt-amount{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:var(--purple);}
  .receipt-name{font-size:13px;color:var(--text);margin-bottom:4px;}
  .receipt-meta{font-size:11px;color:var(--muted);}

  /* Search highlight */
  .hl{background:rgba(108,111,255,0.3);border-radius:3px;padding:0 2px;}

  .empty-state{text-align:center;padding:60px 20px;color:var(--muted);}
  .empty-state .icon{font-size:48px;margin-bottom:12px;opacity:0.4;}
  .empty-state p{font-size:14px;}
  .date-divider{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;padding:8px 0 6px;}

  .overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;backdrop-filter:blur(4px);align-items:flex-end;}
  .overlay.open{display:flex;}
  .sheet{background:var(--bg2);border-radius:24px 24px 0 0;padding:20px 20px 40px;width:100%;max-height:92vh;overflow-y:auto;animation:sheetUp 0.3s cubic-bezier(0.32,0.72,0,1);}
  @keyframes sheetUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
  .sheet-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 20px;}
  .sheet h2{font-size:18px;font-weight:700;margin-bottom:20px;}

  .form-row{margin-bottom:14px;}
  .form-row label{display:block;font-size:11px;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px;}
  .input-group{display:flex;gap:8px;}
  input,select,textarea{background:var(--bg3);border:1px solid var(--border);border-radius:12px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:15px;padding:12px 14px;width:100%;outline:none;transition:border-color 0.15s;-webkit-appearance:none;}
  input:focus,select:focus{border-color:var(--accent);}
  select{flex:0 0 90px;}
  .form-row textarea{min-height:70px;resize:none;}
  .btn-primary{width:100%;padding:15px;background:var(--accent);border:none;border-radius:14px;color:white;font-family:'Syne',sans-serif;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;transition:opacity 0.15s,transform 0.15s;}
  .btn-primary:active{opacity:0.85;transform:scale(0.98);}
  .btn-secondary{width:100%;padding:13px;background:transparent;border:1px solid var(--border);border-radius:14px;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:14px;cursor:pointer;margin-top:8px;}
  .btn-secondary:active{background:var(--bg3);}

  .detail-id{font-size:12px;color:var(--muted);margin-bottom:4px;display:flex;align-items:center;gap:8px;}
  .detail-amount{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;margin-bottom:16px;}
  .info-block{background:var(--bg3);border-radius:14px;padding:14px;margin-bottom:12px;}
  .info-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:14px;}
  .info-row:last-child{border-bottom:none;}
  .info-row .key{color:var(--muted);}.info-row .val{font-weight:500;}
  .timeline{margin-bottom:16px;}
  .timeline h3{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px;}
  .tl-item{display:flex;gap:12px;align-items:flex-start;margin-bottom:14px;}
  .tl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px;}
  .tl-dot.done{background:var(--green);}
  .tl-dot.pending{background:var(--bg3);border:2px solid var(--border);}
  .tl-text{font-size:13px;}.tl-time{font-size:11px;color:var(--muted);margin-top:2px;}
  .action-btns{display:flex;flex-direction:column;gap:8px;margin-top:4px;}
  .btn-action{width:100%;padding:13px;border:none;border-radius:14px;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;cursor:pointer;transition:opacity 0.15s,transform 0.15s;}
  .btn-action:active{opacity:0.8;transform:scale(0.98);}
  .btn-check{background:rgba(77,163,255,0.15);color:var(--blue);}
  .btn-deliver{background:rgba(62,207,142,0.15);color:var(--green);}
  .btn-delete{background:rgba(255,95,87,0.12);color:var(--red);}

  .receipt-paper{background:#fff;border-radius:16px;padding:24px 20px;margin-bottom:16px;color:#111;position:relative;overflow:hidden;border:1px solid #eee;font-family:'Nunito',sans-serif;}
  .receipt-paper::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:repeating-linear-gradient(90deg,#cc0000 0 20px,#222 20px 40px);}
  .rp-logo-wrap{margin-bottom:12px;font-family:'Nunito',sans-serif;}
  .rp-title{font-size:11px;color:#aaa;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;font-family:'Nunito',sans-serif;}
  .rp-amount{font-family:'Nunito',sans-serif;font-size:34px;font-weight:700;color:#111;margin-bottom:18px;line-height:1;}
  .rp-divider{border:none;border-top:1px dashed #e0e0e0;margin:12px 0;}
  .rp-row{display:flex;justify-content:space-between;font-size:13px;color:#333;padding:5px 0;font-family:'Nunito',sans-serif;}
  .rp-row .k{color:#aaa;}
  .rp-id{font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;color:#555;letter-spacing:1px;}
  .rp-footer{margin-top:14px;font-size:10px;color:#bbb;text-align:center;font-family:'Nunito',sans-serif;}
  .btn-pdf{width:100%;padding:13px;background:rgba(62,207,142,0.12);border:none;border-radius:14px;color:var(--green);font-family:"DM Sans",sans-serif;font-size:14px;font-weight:500;cursor:pointer;margin-top:0;}
  .btn-pdf:active{opacity:0.8;}
  @media print{body>*{display:none!important;}#print-area{display:block!important;position:fixed;inset:0;padding:32px;background:#fff;}}
  #print-area{display:none;}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<!-- PAGE: Transfers -->
<div class="page active" id="page-transfers">
  <div class="header">
    <div><h1>Переводы</h1><span id="today-date"></span></div>
    <button class="add-btn" onclick="openNewTransfer()">+</button>
  </div>
  <div class="search-wrap">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="t-search" placeholder="Поиск по ID или сумме..." oninput="onTSearch(this)">
      <button class="search-clear" id="t-clear" onclick="clearSearch('t')">×</button>
    </div>
  </div>
  <div class="stats">
    <div class="stat"><div class="val" id="stat-total">0</div><div class="lbl">Всего</div></div>
    <div class="stat"><div class="val" id="stat-pending" style="color:var(--orange)">0</div><div class="lbl">В процессе</div></div>
    <div class="stat"><div class="val" id="stat-earned" style="color:var(--green)">$0</div><div class="lbl">Комиссия</div></div>
  </div>
  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all',this,'t')">Все</button>
    <button class="filter-btn" onclick="setFilter('waiting',this,'t')">Ждём чек</button>
    <button class="filter-btn" onclick="setFilter('check',this,'t')">Чек получен</button>
    <button class="filter-btn" onclick="setFilter('done',this,'t')">Доставлено</button>
  </div>
  <div class="list" id="transfer-list"></div>
</div>

<!-- PAGE: Receipts -->
<div class="page" id="page-receipts">
  <div class="header">
    <div><h1>Чеки</h1><span id="receipts-count"></span></div>
    <button class="add-btn" style="background:var(--purple)" onclick="openNewReceipt()">+</button>
  </div>
  <div class="search-wrap">
    <div class="search-box">
      <span class="search-icon">🔍</span>
      <input class="search-input" id="r-search" placeholder="Поиск по ID или имени..." oninput="onRSearch(this)">
      <button class="search-clear" id="r-clear" onclick="clearSearch('r')">×</button>
    </div>
  </div>
  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all',this,'r')">Все</button>
    <button class="filter-btn" onclick="setFilter('waiting',this,'r')">Ждём</button>
    <button class="filter-btn" onclick="setFilter('check',this,'r')">Получен</button>
    <button class="filter-btn" onclick="setFilter('done',this,'r')">Доставлено</button>
  </div>
  <div class="list" id="receipt-list"></div>
</div>

<!-- Bottom Nav -->
<div class="bottom-nav">
  <button class="nav-btn active" id="nav-transfers" onclick="switchPage('transfers')">
    <span class="nav-icon">↔</span>Переводы
  </button>
  <button class="nav-btn" id="nav-receipts" onclick="switchPage('receipts')">
    <span class="nav-icon">🧾</span>Чеки
  </button>
</div>

<!-- New Transfer Sheet -->
<div class="overlay" id="new-transfer-overlay" onclick="closeIfOutside(event,'new-transfer-overlay')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2>Новый перевод</h2>
    <div class="form-row"><label>Отправляет</label>
      <div class="input-group">
        <input type="number" id="from-amount" placeholder="0" inputmode="decimal">
        <select id="from-currency"><option>RUB</option><option>EUR</option><option>USD</option><option>GEL</option><option>KGS</option><option>TJS</option><option>UZS</option><option>AZN</option><option>USDT</option><option>TON</option></select>
      </div>
    </div>
    <div class="form-row"><label>Получает</label>
      <div class="input-group">
        <input type="number" id="to-amount" placeholder="0" inputmode="decimal">
        <select id="to-currency"><option>USD</option><option>USDT</option><option>EUR</option><option>RUB</option><option>GEL</option><option>KGS</option><option>TJS</option><option>UZS</option><option>AZN</option><option>TON</option><option>Нал</option></select>
      </div>
    </div>
    <div class="form-row"><label>Моя комиссия (USD)</label><input type="number" id="commission" placeholder="0" inputmode="decimal"></div>
    <div class="form-row"><label>Заметка (необязательно)</label><textarea id="note" placeholder="имя клиента, контакт..."></textarea></div>
    <button class="btn-primary" onclick="createTransfer()">Создать перевод</button>
    <button class="btn-secondary" onclick="closeSheet('new-transfer-overlay')">Отмена</button>
  </div>
</div>

<!-- New Receipt Sheet -->
<div class="overlay" id="new-receipt-overlay" onclick="closeIfOutside(event,'new-receipt-overlay')">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <h2>Новый чек</h2>
    <div class="form-row"><label>Сумма</label>
      <div class="input-group">
        <input type="number" id="r-amount" placeholder="0" inputmode="decimal">
        <select id="r-currency"><option>USDT</option><option>USD</option><option>EUR</option><option>RUB</option><option>GEL</option><option>KGS</option><option>TJS</option><option>UZS</option><option>AZN</option><option>TON</option></select>
      </div>
    </div>
    <div class="form-row"><label>Имя получателя</label><input type="text" id="r-name" placeholder="Иван Петров"></div>
    <div class="form-row"><label>Заметка (необязательно)</label><textarea id="r-note" placeholder="детали..."></textarea></div>
    <button class="btn-primary" style="background:var(--purple)" onclick="createReceipt()">Создать чек</button>
    <button class="btn-secondary" onclick="closeSheet('new-receipt-overlay')">Отмена</button>
  </div>
</div>

<!-- Transfer Detail -->
<div class="overlay" id="transfer-detail-overlay" onclick="closeIfOutside(event,'transfer-detail-overlay')">
  <div class="sheet" id="transfer-detail-sheet"></div>
</div>

<!-- Receipt Detail -->
<div class="overlay" id="receipt-detail-overlay" onclick="closeIfOutside(event,'receipt-detail-overlay')">
  <div class="sheet" id="receipt-detail-sheet"></div>
</div>

<script>
let transfers = JSON.parse(localStorage.getItem('transfers')||'[]');
let receipts  = JSON.parse(localStorage.getItem('receipts') ||'[]');
let tFilter='all', rFilter='all';
let tQuery='', rQuery='';

function save(){
  localStorage.setItem('transfers',JSON.stringify(transfers));
  localStorage.setItem('receipts', JSON.stringify(receipts));
}
function genTId(){return transfers.length?Math.max(...transfers.map(t=>t.id))+1:1001;}
function genRId(){return receipts.length ?Math.max(...receipts.map(r=>r.id))+1 :5001;}

function fmtDate(ts){
  if(!ts)return'';
  const d=new Date(ts),now=new Date(),diff=now-d;
  if(diff<86400000&&d.getDate()===now.getDate())return'сегодня · '+d.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
  if(diff<172800000)return'вчера · '+d.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
  return d.toLocaleDateString('ru',{day:'numeric',month:'short'})+' · '+d.toLocaleTimeString('ru',{hour:'2-digit',minute:'2-digit'});
}
function fmtFull(ts){
  if(!ts)return'';
  return new Date(ts).toLocaleString('ru',{day:'numeric',month:'long',year:'numeric',hour:'2-digit',minute:'2-digit'});
}
function statusInfo(s){
  if(s==='waiting')return['Ждём чек получателя','status-waiting'];
  if(s==='check')  return['Чек получен','status-check'];
  return['Доставлено','status-done'];
}
function hl(text, query){
  if(!query) return text;
  const re=new RegExp('('+query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return String(text).replace(re,'<span class="hl">$1</span>');
}

// --- Nav ---
function switchPage(p){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  document.getElementById('nav-'+p).classList.add('active');
}

// --- Filters ---
function setFilter(f,btn,type){
  if(type==='t'){tFilter=f;document.querySelectorAll('#page-transfers .filter-btn').forEach(b=>b.classList.remove('active'));}
  else          {rFilter=f;document.querySelectorAll('#page-receipts  .filter-btn').forEach(b=>b.classList.remove('active'));}
  btn.classList.add('active');
  if(type==='t')renderTransfers();else renderReceipts();
}

// --- Search ---
function onTSearch(inp){
  tQuery=inp.value.trim();
  document.getElementById('t-clear').classList.toggle('visible',tQuery.length>0);
  renderTransfers();
}
function onRSearch(inp){
  rQuery=inp.value.trim();
  document.getElementById('r-clear').classList.toggle('visible',rQuery.length>0);
  renderReceipts();
}
function clearSearch(type){
  if(type==='t'){tQuery='';document.getElementById('t-search').value='';document.getElementById('t-clear').classList.remove('visible');renderTransfers();}
  else          {rQuery='';document.getElementById('r-search').value='';document.getElementById('r-clear').classList.remove('visible');renderReceipts();}
}

// ---- TRANSFERS ----
function renderTransfers(){
  const list=document.getElementById('transfer-list');
  let data=tFilter==='all'?transfers:transfers.filter(t=>t.status===tFilter);

  if(tQuery){
    const q=tQuery.toLowerCase();
    data=data.filter(t=>
      String(t.id).includes(q)||
      String(t.fromAmount).includes(q)||
      String(t.toAmount).includes(q)||
      (t.note&&t.note.toLowerCase().includes(q))
    );
  }
  data=[...data].reverse();

  document.getElementById('stat-total').textContent=transfers.length;
  document.getElementById('stat-pending').textContent=transfers.filter(t=>t.status!=='done').length;
  const earned=transfers.filter(t=>t.status==='done').reduce((s,t)=>s+(parseFloat(t.commission)||0),0);
  document.getElementById('stat-earned').textContent='$'+earned.toFixed(0);

  if(!data.length){
    list.innerHTML=tQuery
      ?'<div class="empty-state"><div class="icon">🔍</div><p>Ничего не найдено по «'+tQuery+'»</p></div>'
      :'<div class="empty-state"><div class="icon">📋</div><p>Переводов пока нет</p></div>';
    return;
  }

  let html='',lastDate='';
  data.forEach(t=>{
    if(!tQuery){
      const dk=new Date(t.createdAt).toLocaleDateString('ru',{day:'numeric',month:'long'});
      if(dk!==lastDate){html+=`<div class="date-divider">${dk}</div>`;lastDate=dk;}
    }
    const [label,cls]=statusInfo(t.status);
    const idStr=hl('#'+t.id, tQuery);
    const amountStr=hl(t.fromAmount,tQuery)+' '+t.fromCurrency+' → '+hl(t.toAmount,tQuery)+' '+t.toCurrency;
    const noteStr=t.note?hl(t.note,tQuery):'';
    html+=`<div class="transfer-card" onclick="openTransferDetail(${t.id})">
      <div class="card-top">
        <span class="card-amount">${amountStr}</span>
        <span class="status-badge ${cls}">${label}</span>
      </div>
      <div class="card-bot">
        <span class="card-meta">${idStr} · ${fmtDate(t.createdAt)}${noteStr?' · '+noteStr:''}</span>
        <span class="card-commission">+$${t.commission}</span>
      </div>
    </div>`;
  });
  list.innerHTML=html;
}

function openNewTransfer(){
  ['from-amount','to-amount','commission','note'].forEach(id=>document.getElementById(id).value='');
  openSheet('new-transfer-overlay');
}
function createTransfer(){
  const fa=document.getElementById('from-amount').value.trim();
  const ta=document.getElementById('to-amount').value.trim();
  if(!fa||!ta){alert('Заполни суммы');return;}
  transfers.push({id:genTId(),fromAmount:fa,fromCurrency:document.getElementById('from-currency').value,toAmount:ta,toCurrency:document.getElementById('to-currency').value,commission:document.getElementById('commission').value||'0',note:document.getElementById('note').value.trim(),status:'waiting',createdAt:Date.now(),checkAt:null,deliveredAt:null});
  save();closeSheet('new-transfer-overlay');renderTransfers();
}
function openTransferDetail(id){
  const t=transfers.find(x=>x.id===id);if(!t)return;
  const [label,cls]=statusInfo(t.status);
  const steps=[
    {text:'Перевод создан',               ts:t.createdAt,  done:true},
    {text:'Чек от получателя получен',    ts:t.checkAt,    done:!!t.checkAt},
    {text:'Деньги доставлены получателю', ts:t.deliveredAt,done:!!t.deliveredAt}
  ];
  const tlHtml=steps.map(s=>`<div class="tl-item"><div class="tl-dot ${s.done?'done':'pending'}"></div><div><div class="tl-text" style="color:${s.done?'var(--text)':'var(--muted)'}">${s.text}</div>${s.ts?`<div class="tl-time">${fmtDate(s.ts)}</div>`:''}</div></div>`).join('');
  let actions='';
  if(t.status==='waiting') actions=`<button class="btn-action btn-check" onclick="updateTransfer(${id},'check')">Чек от получателя получен</button>`;
  else if(t.status==='check') actions=`<button class="btn-action btn-deliver" onclick="updateTransfer(${id},'done')">Деньги доставлены получателю ✓</button>`;
  else actions=`<div style="text-align:center;padding:8px;font-size:13px;color:var(--green);">✓ Перевод завершён</div>`;
  document.getElementById('transfer-detail-sheet').innerHTML=`
    <div class="sheet-handle"></div>
    <div class="detail-id">#${t.id} <span class="status-badge ${cls}">${label}</span></div>
    <div class="detail-amount">${t.fromAmount} ${t.fromCurrency} → ${t.toAmount} ${t.toCurrency}</div>
    <div class="info-block">
      <div class="info-row"><span class="key">Комиссия</span><span class="val" style="color:var(--green)">+$${t.commission}</span></div>
      <div class="info-row"><span class="key">Создан</span><span class="val">${fmtDate(t.createdAt)}</span></div>
      ${t.note?`<div class="info-row"><span class="key">Заметка</span><span class="val">${t.note}</span></div>`:''}
    </div>
    <div class="timeline"><h3>История</h3>${tlHtml}</div>
    <div class="action-btns">${actions}<button class="btn-action btn-delete" onclick="deleteTransfer(${id})">Удалить перевод</button><button class="btn-secondary" onclick="closeSheet('transfer-detail-overlay')">Закрыть</button></div>`;
  openSheet('transfer-detail-overlay');
}
function updateTransfer(id,status){
  const t=transfers.find(x=>x.id===id);if(!t)return;
  t.status=status;
  if(status==='check')t.checkAt=Date.now();
  if(status==='done') t.deliveredAt=Date.now();
  save();closeSheet('transfer-detail-overlay');renderTransfers();
  setTimeout(()=>openTransferDetail(id),50);
}
function deleteTransfer(id){
  if(!confirm('Удалить перевод?'))return;
  transfers=transfers.filter(x=>x.id!==id);
  save();closeSheet('transfer-detail-overlay');renderTransfers();
}

// ---- RECEIPTS ----
function renderReceipts(){
  const list=document.getElementById('receipt-list');
  let data=rFilter==='all'?receipts:receipts.filter(r=>r.status===rFilter);

  if(rQuery){
    const q=rQuery.toLowerCase();
    data=data.filter(r=>
      String(r.id).includes(q)||
      ('чек-'+r.id).includes(q)||
      r.recipientName.toLowerCase().includes(q)||
      String(r.amount).includes(q)||
      (r.note&&r.note.toLowerCase().includes(q))
    );
  }
  data=[...data].reverse();
  document.getElementById('receipts-count').textContent=receipts.length+' чеков';

  if(!data.length){
    list.innerHTML=rQuery
      ?'<div class="empty-state"><div class="icon">🔍</div><p>Ничего не найдено по «'+rQuery+'»</p></div>'
      :'<div class="empty-state"><div class="icon">🧾</div><p>Чеков пока нет</p></div>';
    return;
  }
  let html='';
  data.forEach(r=>{
    const [label,cls]=statusInfo(r.status);
    const idStr=hl('#ЧЕК-'+r.id,rQuery);
    const nameStr=hl(r.recipientName,rQuery);
    const amtStr=hl(r.amount,rQuery);
    html+=`<div class="receipt-card" onclick="openReceiptDetail(${r.id})">
      <div class="receipt-top"><span class="receipt-amount">${amtStr} ${r.currency}</span><span class="status-badge ${cls}">${label}</span></div>
      <div class="receipt-name">${nameStr}</div>
      <div class="receipt-meta">${idStr} · ${fmtDate(r.createdAt)}</div>
    </div>`;
  });
  list.innerHTML=html;
}

    ${paper}
    <div class="timeline"><h3>История</h3>${tlHtml}</div>
    <div class="action-btns">${actions}<button class="btn-pdf" onclick="savePdf(${id})">Сохранить как PDF</button><button class="btn-action btn-delete" onclick="deleteReceipt(${id})">Удалить чек</button><button class="btn-secondary" onclick="closeSheet('receipt-detail-overlay')">Закрыть</button></div>`;
  openSheet('receipt-detail-overlay');
}
function updateReceipt(id,status){
  const r=receipts.find(x=>x.id===id);if(!r)return;
  r.status=status;
  if(status==='check')r.checkAt=Date.now();
  if(status==='done') r.deliveredAt=Date.now();
  save();closeSheet('receipt-detail-overlay');renderReceipts();
  setTimeout(()=>openReceiptDetail(id),50);
}
function deleteReceipt(id){
  if(!confirm('Удалить чек?'))return;
  receipts=receipts.filter(x=>x.id!==id);
  save();closeSheet('receipt-detail-overlay');renderReceipts();
}

function openSheet(id) {document.getElementById(id).classList.add('open');}
function closeSheet(id){document.getElementById(id).classList.remove('open');}
function closeIfOutside(e,id){if(e.target.id===id)closeSheet(id);}

document.getElementById('today-date').textContent=new Date().toLocaleDateString('ru',{day:'numeric',month:'long',year:'numeric'});
renderTransfers();
renderReceipts();

function savePdf(id){
  const r=receipts.find(x=>x.id===id);if(!r)return;
  const btn=event.target;
  btn.textContent='Генерирую...';btn.disabled=true;

  const LOGO=document.querySelector('#receipt-detail-sheet .rp-logo-wrap img');
  const logoSrc=LOGO?LOGO.src:'';

  const wrap=document.createElement('div');
  wrap.style.cssText='position:fixed;left:-9999px;top:0;width:380px;padding:32px;background:#fff;font-family:Nunito,sans-serif;';
  wrap.innerHTML=`
    <div style="background:#fff;border-radius:16px;padding:24px 20px;color:#111;position:relative;overflow:hidden;border:1px solid #eee;">
      <div style="position:absolute;top:0;left:0;right:0;height:4px;background:repeating-linear-gradient(90deg,#cc0000 0 20px,#222 20px 40px);"></div>
      ${logoSrc?`<img src="${logoSrc}" style="height:48px;object-fit:contain;margin-bottom:12px;display:block;">`:''}
      <div style="font-size:11px;color:#888;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px;">СУММА К ПОЛУЧЕНИЮ</div>
      <div style="font-size:32px;font-weight:700;color:#111;margin-bottom:18px;line-height:1;">${r.amount} ${r.currency}</div>
      <hr style="border:none;border-top:1px dashed rgba(255,255,255,0.15);margin:12px 0;">
      <div style="display:flex;justify-content:space-between;font-size:13px;color:#333;padding:5px 0;">
        <span style="color:#888;">Получатель</span><span><b>${r.recipientName}</b></span>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:13px;color:#333;padding:5px 0;">
        <span style="color:#888;">ID чека</span><span style="font-family:monospace;font-weight:700;color:#6c6fff;letter-spacing:1px;">#ЧЕК-${r.id}</span>
      </div>
      <div style="display:flex;justify-content:space-between;font-size:13px;color:#333;padding:5px 0;">
        <span style="color:#888;">Дата создания</span><span>${fmtFull(r.createdAt)}</span>
      </div>
      ${r.note?`<div style="display:flex;justify-content:space-between;font-size:13px;color:#333;padding:5px 0;"><span style="color:#888;">Заметка</span><span>${r.note}</span></div>`:''}
      <hr style="border:none;border-top:1px dashed rgba(255,255,255,0.15);margin:12px 0;">
      <div style="margin-top:14px;font-size:10px;color:#555;text-align:center;">Действителен только для указанного получателя · KT Transfer</div>
    </div>`;
  document.body.appendChild(wrap);

  html2canvas(wrap,{backgroundColor:'#111',scale:2,useCORS:true,logging:false}).then(canvas=>{
    document.body.removeChild(wrap);
    const {jsPDF}=window.jspdf;
    const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const imgW=170;
    const imgH=canvas.height*(imgW/canvas.width);
    pdf.addImage(canvas.toDataURL('image/png'),'PNG',20,20,imgW,imgH);
    pdf.save('ЧЕК-'+r.id+'-'+r.recipientName+'.pdf');
    btn.textContent='Сохранить как PDF';btn.disabled=false;
  }).catch(e=>{
    document.body.removeChild(wrap);
    alert('Ошибка: '+e.message);
    btn.textContent='Сохранить как PDF';btn.disabled=false;
  });
}
</script>
